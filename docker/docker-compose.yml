version: '3.8'

services:
  # Backend API Server
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/app/data/hikarune.db
      - JWT_SECRET=${JWT_SECRET:-hikarune-secret-key-change-in-production}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
    volumes:
      - server-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Client
  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server-data: